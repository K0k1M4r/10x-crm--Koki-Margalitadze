<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - 10x CRM</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="main-header">
        <div class="app-container nav-wrapper">
            <a href="dashboard.html" class="nav-brand">10X CRM</a>
            <ul class="nav-links">
                <li><a href="dashboard.html" class="nav-item" data-page="dashboard">Dashboard</a></li>
                <li><a href="clients.html" class="nav-item" data-page="clients">Clients</a></li>
                <li><a href="profile.html" class="nav-item" data-page="profile">Profile</a></li>
            </ul>
            <div class="nav-actions">
                <button id="theme-toggle" class="btn-icon" title="Toggle theme">🌙</button>
                <button id="logout-btn" class="btn-logout">Logout</button>
            </div>
        </div>
    </header>

    <main class="app-container">
        <h1>Profile</h1>

        <!-- Info display -->
        <section class="profile-info-block">
            <div id="profile-avatar" class="avatar-circle"></div>
            <h2 id="profile-name"></h2>
            <p id="profile-email"></p>
            <p id="profile-company"></p>
            <p id="profile-member-since"></p>
        </section>

        <!-- Edit info form -->
        <section class="profile-edit-section">
            <h2>Edit Info</h2>
            <div id="profile-error-box" class="error-summary-box">
                <ul id="profile-error-list" class="error-summary-list"></ul>
            </div>
            <form id="profile-edit-form" novalidate>
                <div class="form-group">
                    <label for="edit-fullname">Full Name</label>
                    <input type="text" id="edit-fullname" class="form-control">
                </div>
                <div class="form-group">
                    <label for="edit-company">Company</label>
                    <input type="text" id="edit-company" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </section>

        <!-- Password change form -->
        <section class="password-change-section">
            <h2>Change Password</h2>
            <div id="password-error-box" class="error-summary-box">
                <ul id="password-error-list" class="error-summary-list"></ul>
            </div>
            <form id="password-change-form" novalidate>
                <div class="form-group">
                    <label for="current-password">Current Password</label>
                    <input type="password" id="current-password" class="form-control">
                </div>
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" class="form-control">
                </div>
                <div class="form-group">
                    <label for="confirm-new-password">Confirm New Password</label>
                    <input type="password" id="confirm-new-password" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary">Change Password</button>
            </form>
        </section>

        <!-- Reset data -->
        <section class="reset-data-section">
            <h2>Data Management</h2>
            <button id="reset-data-btn" class="btn-logout">Reset CRM Data</button>
        </section>
    </main>

    <script src="js/toast.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/profile.js" defer></script>
</body>
</html>
