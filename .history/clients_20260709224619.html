<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients - 10x CRM</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="main-header">
        <div class="app-container nav-wrapper">
            <a href="dashboard.html" class="nav-brand">10X CRM</a>
            <ul class="nav-links">
                <li><a href="dashboard.html" class="nav-item" data-page="dashboard">Dashboard</a></li>
                <li><a href="clients.html" class="nav-item" data-page="clients">Clients</a></li>
                <li><a href="profile.html" class="nav-item" data-page="profile">Profile</a></li>
            </ul>
            <div class="nav-actions">
                <button id="theme-toggle" class="btn-icon" title="Toggle theme">🌙</button>
                <button id="logout-btn" class="btn-logout">Logout</button>
            </div>
        </div>
    </header>

    <main class="app-container">
        <div class="page-header-row">
            <h1>Clients</h1>
            <button id="add-client-btn" class="btn btn-primary" style="width:auto;">+ Add Client</button>
        </div>

        <!-- Toolbar: search, filters, sort -->
        <div class="clients-toolbar">
            <input type="text" id="client-search" class="form-control" placeholder="Search by name or company...">

            <div class="filter-chips" id="filter-chips">
                <button class="chip active" data-status="All">All</button>
                <button class="chip" data-status="Lead">Lead</button>
                <button class="chip" data-status="Contacted">Contacted</button>
                <button class="chip" data-status="Won">Won</button>
                <button class="chip" data-status="Lost">Lost</button>
            </div>

            <select id="sort-select" class="form-control" style="width:auto;">
                <option value="newest">Newest first</option>
                <option value="name">Name A→Z</option>
                <option value="value">Deal value: high→low</option>
            </select>
        </div>

        <!-- Client list -->
        <div id="clients-list-container">
            <p id="clients-loading-msg">Loading clients...</p>
        </div>
    </main>

    <!-- Add Client Modal (hidden by default) -->
    <div id="add-client-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h2>Add Client</h2>
            <div id="add-client-error-box" class="error-summary-box">
                <ul id="add-client-error-list" class="error-summary-list"></ul>
            </div>
            <form id="add-client-form" novalidate>
                <div class="form-group">
                    <label for="client-name">Name</label>
                    <input type="text" id="client-name" class="form-control">
                </div>
                <div class="form-group">
                    <label for="client-email">Email</label>
                    <input type="email" id="client-email" class="form-control">
                </div>
                <div class="form-group">
                    <label for="client-phone">Phone</label>
                    <input type="text" id="client-phone" class="form-control">
                </div>
                <div class="form-group">
                    <label for="client-company">Company</label>
                    <input type="text" id="client-company" class="form-control">
                </div>
                <div class="form-group">
                    <label for="client-deal-value">Deal Value</label>
                    <input type="number" id="client-deal-value" class="form-control">
                </div>
                <div class="form-group">
                    <label for="client-status">Status</label>
                    <select id="client-status" class="form-control">
                        <option value="Lead">Lead</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Won">Won</option>
                        <option value="Lost">Lost</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Add Client</button>
            </form>
        </div>
    </div>

    <!-- Client Detail Modal (hidden by default) -->
    <div id="client-detail-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box" id="client-detail-content">
            <!-- Filled dynamically by JS -->
        </div>
    </div>

    <script src="js/toast.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/guard.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/clients.js" defer></script>
</body>
</html>
